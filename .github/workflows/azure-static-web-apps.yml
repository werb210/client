name: Azure Static Web App Deploy

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client-app/package-lock.json

      - name: Install client dependencies
        working-directory: client-app
        run: npm ci

      - name: Build client
        working-directory: client-app
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_SIGNNOW_CLIENT_ID: ${{ secrets.VITE_SIGNNOW_CLIENT_ID }}
          VITE_SIGNNOW_REDIRECT_URL: ${{ secrets.VITE_SIGNNOW_REDIRECT_URL }}
        run: npm run build

      - name: Verify build output
        run: |
          test -d client-app/dist
          test -f client-app/dist/index.html
          ls -la client-app/dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "client-app"
          api_location: ""
          output_location: "dist"
          skip_app_build: true
