name: Client CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  client:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client-app/package-lock.json

      - name: Install
        run: |
          cd client-app
          npm ci

      - name: Typecheck
        run: |
          cd client-app
          npx tsc --noEmit || true

      - name: Lint
        run: |
          cd client-app
          npx eslint . || true

      - name: Build
        run: |
          cd client-app
          npm run build

      - name: Test
        run: |
          cd client-app
          npx vitest --run
