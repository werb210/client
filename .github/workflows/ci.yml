name: Client CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  client:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit || true

      - name: Lint
        run: npx eslint . || true

      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest --run
